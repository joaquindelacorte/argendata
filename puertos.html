<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Puertos - Reporte Diario</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Panel de información flotante */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 5px solid #2c3e50;
            max-width: 280px;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #333; }
        .resumen { font-size: 14px; line-height: 1.6; }
        .total-camiones { font-size: 20px; font-weight: bold; color: #e67e22; }
        
        /* Estilo de los Popups */
        .leaflet-popup-content-wrapper { border-radius: 8px; padding: 5px; }
        .popup-titulo { font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 5px; padding-bottom: 3px; }
        .cereal-item { display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h2>🚚 REPORTE DE PUERTOS</h2>
        <div class="resumen">
            <strong>Fecha:</strong> 10/04/2026<br>
            <span class="total-camiones">📈 TOTAL: 3752</span>
            <hr>
            🌽 Maíz: 2444<br>
            🌱 Soja: 516<br>
            🌾 Trigo: 650<br>
            🌻 Girasol: 52
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicializar mapa (Centrado en la zona del Gran Rosario/San Lorenzo)
        const map = L.map('map').setView([-32.90, -60.60], 9);

        // 2. SOLUCIÓN AL ERROR DE LA IMAGEN: Usar CartoDB en lugar de OpenStreetMap directo
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. Base de datos con las 24 ubicaciones proporcionadas
        const datosPuertos = [
            { n: "ACA - SAN LORENZO", lat: -32.7335, lng: -60.7301, t: 228, d: "S:0|M:222|T:6" },
            { n: "ACA - TIMBUES", lat: -32.6661, lng: -60.7315, t: 374, d: "S:0|M:135|T:239" },
            { n: "ADM AGRO S.R.L. - ARROYO SECO", lat: -33.1558, lng: -60.4852, t: 450, d: "S:0|M:370|T:80" },
            { n: "ADM AGRO S.R.L. - PTO GRAL SAN MARTIN", lat: -32.7165, lng: -60.7310, t: 72, d: "S:0|M:50|T:22" },
            { n: "AGD TIMBUES", lat: -32.6742, lng: -60.7268, t: 190, d: "S:0|M:190|T:0" },
            { n: "BARADERO", lat: -33.8058, lng: -59.5052, t: 8, d: "S:0|M:8|T:0" },
            { n: "BUNGE - PGSM", lat: -32.7231, lng: -60.7305, t: 238, d: "S:0|M:114|T:124" },
            { n: "BUNGE - RAMALLO", lat: -33.4795, lng: -60.0125, t: 130, d: "S:0|M:90|T:40" },
            { n: "CARGILL - ALVEAR", lat: -33.0561, lng: -60.5985, t: 54, d: "S:8|M:28|T:18" },
            { n: "CARGILL QUEBRACHO - PGSM", lat: -32.7042, lng: -60.7338, t: 215, d: "S:65|M:150|T:0" },
            { n: "COFCO - LIMA", lat: -33.9782, lng: -59.1895, t: 70, d: "S:0|M:70|T:0" },
            { n: "COFCO - PGSM", lat: -32.7305, lng: -60.7288, t: 374, d: "S:16|M:358|T:0" },
            { n: "COFCO - TIMBUES", lat: -32.6595, lng: -60.7345, t: 232, d: "S:1|M:231|T:0" },
            { n: "DREYFUS - GRAL. LAGOS", lat: -33.1095, lng: -60.5285, t: 47, d: "S:12|M:10|T:25" },
            { n: "DREYFUS - TIMBUES", lat: -32.6510, lng: -60.7380, t: 210, d: "S:0|M:210|T:0" },
            { n: "FCA. VICENTIN", lat: -32.7652, lng: -60.7610, t: 15, d: "S:15|M:0|T:0" },
            { n: "MOLINO CHABAS SA", lat: -33.3285, lng: -61.1685, t: 24, d: "S:0|M:0|T:24" },
            { n: "MOLINOS AGRO - SAN LORENZO", lat: -32.7485, lng: -60.7255, t: 70, d: "S:52|M:18|T:0" },
            { n: "RENOVA S.A.", lat: -32.6850, lng: -60.7225, t: 370, d: "S:270|M:100|T:0" },
            { n: "SEMINO MOLINOS", lat: -32.8550, lng: -61.1455, t: 10, d: "S:0|M:0|T:10" },
            { n: "SERV. PORT. (VILLA C.)", lat: -33.2265, lng: -60.3245, t: 19, d: "S:0|M:19|T:0" },
            { n: "TERMINAL 6", lat: -32.6955, lng: -60.7325, t: 71, d: "S:49|M:22|T:0" },
            { n: "TERMINAL PUERTO SAN PEDRO", lat: -33.6745, lng: -59.6610, t: 60, d: "S:28|M:0|T:32" },
            { n: "U6 - SERVICIOS PORTUARIOS S.A.", lat: -32.9690, lng: -60.6255, t: 79, d: "S:0|M:49|T:30" }
        ];

        // 4. Función para elegir color del marcador según tráfico
        function getColor(camiones) {
            return camiones > 300 ? '#e74c3c' : // Rojo: Tráfico alto
                   camiones > 100 ? '#f39c12' : // Naranja: Tráfico medio
                                    '#27ae60';   // Verde: Tráfico bajo
        }

        // 5. Dibujar cada puerto en el mapa
        datosPuertos.forEach(p => {
            // Usamos círculos como indicadores de tráfico
            const marker = L.circleMarker([p.lat, p.lng], {
                radius: 10,
                fillColor: getColor(p.t),
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            // Contenido de la ventana al hacer clic
            const popupCont = `
                <div class="popup-titulo">${p.n}</div>
                <div style="font-size:16px; margin: 5px 0;"><strong>${p.t} Camiones</strong> 🚚</div>
                <div class="cereal-item">${p.d}</div>
            `;
            
            marker.bindPopup(popupCont);
            
            // Tooltip permanente con el nombre (opcional)
            marker.bindTooltip(p.n, { direction: 'top', offset: [0, -10] });
        });

    </script>
</body>
</html>
